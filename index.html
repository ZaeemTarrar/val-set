<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Date Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2b2b45);
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .label {
      font-size: 20px;
      font-weight: bold;
    }

    .days {
      font-size: 28px;
      color: #00d4ff;
      margin-top: 10px;
    }

    .ymd {
      font-size: 18px;
      color: #ffd166;
      margin-top: 5px;
    }

    .date {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📅 Date Tracker</h1>
    <div id="list"></div>
  </div>

  <script>
    const data = [
      { label: "Born Since", from: "1996-02-01" },
      { label: "Working Since", from: "2014-08-01" },
      { label: "Study Gap-1", from: "2014-08-01", to: "2022-05-26" },
      { label: "Study Gap-2", from: "2025-08-14" },
      { label: "Lived in Malaysia", from: "2022-08-14", to: "2025-08-14" },
      { label: "Studied at INTI", from: "2022-05-26", to: "2025-08-13" },
      { label: "Stayed in London", from: "2025-08-14", to: "2025-11-16" },
      { label: "Know Noor Since", from: "2023-09-27" },
      { label: "With Noor", from: "2023-09-27", to: "2025-08-13" },
      { label: "Without Noor", from: "2025-08-14" },
    ];

    function getDates(item) {
      const from = new Date(item.from);
      const to = item.to ? new Date(item.to) : new Date();
      return { from, to };
    }

    function getDaysPassed(from, to) {
      const diff = to - from;
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function getYMDDifference(from, to) {
      let start = new Date(from);
      let end = new Date(to);

      let years = end.getFullYear() - start.getFullYear();
      let months = end.getMonth() - start.getMonth();
      let days = end.getDate() - start.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
        days += prevMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      return `${years}y ${months}m ${days}d`;
    }

    function render() {
      const container = document.getElementById("list");
      container.innerHTML = "";

      data.forEach(item => {
        const { from, to } = getDates(item);

        const days = getDaysPassed(from, to);
        const ymd = getYMDDifference(from, to);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="label">${item.label}</div>
          <div class="days">${days} days</div>
          <div class="ymd">${ymd}</div>
          <div class="date">
            ${item.from} → ${item.to || "Today"}
          </div>
        `;

        container.appendChild(card);
      });
    }

    render();
  </script>
</body>
</html>
