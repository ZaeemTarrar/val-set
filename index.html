<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Date Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2b2b45);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .label {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .days {
      font-size: 28px;
      color: #00d4ff; /* Blue */
    }

    .ymd {
      font-size: 18px;
      color: #ffd166; /* Yellow */
      margin-top: 5px;
    }

    .date {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📅 Date Tracker</h1>
    <div id="list"></div>
  </div>

  <script>
    const data = [
      { label: "Started University", date: "2023-09-01" },
      { label: "Gym Journey", date: "2024-01-15" },
      { label: "Project Launch", date: "2025-06-01" }
    ];

    function getDaysPassed(dateStr) {
      const givenDate = new Date(dateStr);
      const today = new Date();
      const diffTime = today - givenDate;
      return Math.floor(diffTime / (1000 * 60 * 60 * 24));
    }

    function getYMDDifference(startDateStr) {
      const start = new Date(startDateStr);
      const end = new Date();

      let years = end.getFullYear() - start.getFullYear();
      let months = end.getMonth() - start.getMonth();
      let days = end.getDate() - start.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
        days += prevMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      return `${years} year${years !== 1 ? "s" : ""}, ${months} month${months !== 1 ? "s" : ""}, ${days} day${days !== 1 ? "s" : ""}`;
    }

    function render() {
      const container = document.getElementById("list");
      container.innerHTML = "";

      data.forEach(item => {
        const days = getDaysPassed(item.date);
        const ymd = getYMDDifference(item.date);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="label">${item.label}</div>
          <div class="days">${days} days</div>
          <div class="ymd">${ymd}</div>
          <div class="date">Since ${item.date}</div>
        `;

        container.appendChild(card);
      });
    }

    render();
  </script>
</body>
</html>
