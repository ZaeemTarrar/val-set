<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Greeting Card</title>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe Script', 'Brush Script MT', cursive;
            overflow: hidden;
        }
        
        .card {
            width: 80%;
            max-width: 600px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            z-index: -1;
            filter: blur(20px);
            opacity: 0.6;
        }
        
        h1 {
            color: #d23669;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .message {
            font-size: 1.5rem;
            line-height: 1.6;
            color: #333;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1.5s forwards 0.5s;
        }
        
        .signature {
            margin-top: 40px;
            text-align: right;
            font-style: italic;
            color: #d23669;
            font-size: 1.3rem;
            opacity: 0;
            animation: fadeIn 1s forwards 2s;
        }
        
        .hearts {
            position: absolute;
            font-size: 1.2rem;
            color: #ff6b81;
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        
        /* Random heart positions */
        .heart1 { top: 10%; left: 15%; animation-delay: 0s; }
        .heart2 { top: 80%; left: 80%; animation-delay: 1s; }
        .heart3 { top: 60%; left: 10%; animation-delay: 2s; }
        .heart4 { top: 30%; left: 85%; animation-delay: 3s; }
    </style>
</head>
<body>
    <div class="card">
        <!-- Floating hearts -->
        <div class="hearts heart1">❤️</div>
        <div class="hearts heart2">❤️</div>
        <div class="hearts heart3">❤️</div>
        <div class="hearts heart4">❤️</div>
        
        <h1>To Someone Special</h1>
        
        <div class="message">
            Every moment with you feels like a beautiful dream I never want to wake up from.<br><br>
            Your smile brightens my darkest days, and your love gives me strength.<br><br>
            Today, tomorrow, and forever - my heart belongs to you.
        </div>
        
        <div class="signature">
            With all my love,<br>
            [Your Name]
        </div>
    </div>
</body>
</html>
