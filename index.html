<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Date Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2b2b45);
      color: #fff;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 40px;
      margin-bottom: 10px;
      font-size: 18px;
      opacity: 0.8;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .card {
      border-radius: 16px;
      padding: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* 🎯 Slightly stronger but still faded */
    .fixed {
      background: rgba(255, 255, 255, 0.08);
    }

    .increasing {
      background: rgba(120, 150, 130, 0.28);
    }

    .decreasing {
      background: rgba(160, 110, 110, 0.28);
    }

    .label {
      font-size: 16px;
      font-weight: bold;
    }

    .days {
      font-size: 22px;
      color: #00d4ff;
      margin-top: 8px;
    }

    .ymd {
      font-size: 14px;
      color: #ffd166;
      margin-top: 3px;
    }

    .date {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 5px;
    }

    /* Responsive */
    @media (max-width: 1000px) {
      .container {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .container {
        grid-template-columns: repeat(1, 1fr);
      }
    }
  </style>
</head>
<body>

<h1>📅 Life Timeline</h1>

<div id="app"></div>

<script>
const sections = [
  {
    title: "👤 Personal",
    items: [
      { label: "Born Since", from: "1996-02-01" },
      { label: "My Birthday", to: "0000-02-01" }
    ]
  },
  {
    title: "💼 Work & Study",
    items: [
      { label: "Working Since", from: "2014-08-01" },
      { label: "Study Gap-1", from: "2014-08-01", to: "2022-05-26" },
      { label: "Study Gap-2", from: "2025-08-14" },
      { label: "Studied at INTI", from: "2022-05-26", to: "2025-08-13" }
    ]
  },
  {
    title: "❤️ Noor",
    items: [
      { label: "First Met", from: "2023-09-27" },
      { label: "Been Together For", from: "2023-09-27", to: "2025-08-13" },
      { label: "In Relation Since", from: "2024-02-14" },
      { label: "Long Distance", from: "2025-08-14" },
      { label: "Noor's Birthday", to: "0000-07-19" },
      { label: "First Met Anniversary", to: "0000-09-27" },
      { label: "Relationship Anniversary", to: "0000-02-14" }
    ]
  },
  {
    title: "🎓 Applications & Future",
    items: [
      { label: "OMPT-A Deadline", to: "2026-04-30" },
      { label: "VU Deadline", to: "2026-05-01" },
      { label: "KTU Deadline", to: "2026-06-01" },
      { label: "Semester Starts", to: "2026-09-01" }
    ]
  }
];

function parseDate(dateStr) {
  const today = new Date();

  if (!dateStr) return today;

  // recurring date (0000-MM-DD)
  if (dateStr.startsWith("0000")) {
    const [, month, day] = dateStr.split("-");
    let next = new Date(today.getFullYear(), month - 1, day);

    if (next < today) {
      next.setFullYear(today.getFullYear() + 1);
    }

    return next;
  }

  return new Date(dateStr);
}

function getDates(item) {
  const today = new Date();
  const from = item.from ? parseDate(item.from) : today;
  const to = item.to ? parseDate(item.to) : today;
  return { from, to };
}

function getDaysDiff(from, to) {
  return Math.floor((to - from) / (1000 * 60 * 60 * 24));
}

function getYMDDifference(from, to) {
  let start = new Date(from);
  let end = new Date(to);

  let years = end.getFullYear() - start.getFullYear();
  let months = end.getMonth() - start.getMonth();
  let days = end.getDate() - start.getDate();

  if (days < 0) {
    months--;
    const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
    days += prevMonth.getDate();
  }

  if (months < 0) {
    years--;
    months += 12;
  }

  return `${years}y ${months}m ${days}d`;
}

function getCategory(item) {
  if (item.from && item.to) return "fixed";
  if (item.from && !item.to) return "increasing";
  if (!item.from && item.to) return "decreasing";
  return "fixed";
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const today = new Date();

  sections.forEach(section => {
    const title = document.createElement("h2");
    title.innerText = section.title;
    app.appendChild(title);

    const container = document.createElement("div");
    container.className = "container";

    section.items.forEach(item => {
      const { from, to } = getDates(item);
      const category = getCategory(item);

      let days, ymd;

      if (category === "decreasing") {
        days = getDaysDiff(today, to);
        ymd = getYMDDifference(today, to);
      } else {
        days = getDaysDiff(from, to);
        ymd = getYMDDifference(from, to);
      }

      const card = document.createElement("div");
      card.className = `card ${category}`;

      card.innerHTML = `
        <div class="label">${item.label}</div>
        <div class="days">${days} days</div>
        <div class="ymd">${ymd}</div>
        <div class="date">
          ${item.from || "Today"} → ${item.to || "Today"}
        </div>
      `;

      container.appendChild(card);
    });

    app.appendChild(container);
  });
}

render();
</script>

</body>
</html>
