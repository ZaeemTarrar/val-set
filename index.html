<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Date Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2b2b45);
      color: #fff;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .label {
      font-size: 16px;
      font-weight: bold;
    }

    .days {
      font-size: 22px;
      color: #00d4ff;
      margin-top: 8px;
    }

    .ymd {
      font-size: 14px;
      color: #ffd166;
      margin-top: 3px;
    }

    .date {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 5px;
    }

    /* Responsive */
    @media (max-width: 1000px) {
      .container {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .container {
        grid-template-columns: repeat(1, 1fr);
      }
    }
  </style>
</head>
<body>

  <h1>📅 Life Timeline</h1>
  <div class="container" id="list"></div>

  <script>
    const data = [
      { label: "Born Since", from: "1996-02-01" },
      { label: "Working Since", from: "2014-08-01" },
      { label: "Study Gap-1", from: "2014-08-01", to: "2022-05-26" },
      { label: "Study Gap-2", from: "2025-08-14" },
      { label: "Lived in Malaysia", from: "2022-08-14", to: "2025-08-14" },
      { label: "Studied at INTI", from: "2022-05-26", to: "2025-08-13" },
      { label: "Stayed in London", from: "2025-08-14", to: "2025-11-16" },
      { label: "Know Noor Since", from: "2023-09-27" },
      { label: "With Noor", from: "2023-09-27", to: "2025-08-13" },
      { label: "Without Noor", from: "2025-08-14" },
      { label: "Blocked Noor", from: "2026-04-19" },
      { label: "OMPT-A Exam Deadline", to: "2026-04-30" },
      { label: "VU Application Deadline", to: "2026-05-01" },
      { label: "KTU Application Deadline", to: "2026-06-01" },
      { label: "KTU Semester Starts", to: "2026-09-01" },
    ];

    function getDates(item) {
      const today = new Date();

      const from = item.from ? new Date(item.from) : today;
      const to = item.to ? new Date(item.to) : today;

      return { from, to };
    }

    function getDaysPassed(from, to) {
      const diff = to - from;
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function getYMDDifference(from, to) {
      let start = new Date(from);
      let end = new Date(to);

      let years = end.getFullYear() - start.getFullYear();
      let months = end.getMonth() - start.getMonth();
      let days = end.getDate() - start.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
        days += prevMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      return `${years}y ${months}m ${days}d`;
    }

    function render() {
      const container = document.getElementById("list");
      container.innerHTML = "";

      data.forEach(item => {
        const { from, to } = getDates(item);

        const days = getDaysPassed(from, to);
        const ymd = getYMDDifference(from, to);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="label">${item.label}</div>
          <div class="days">${days} days</div>
          <div class="ymd">${ymd}</div>
          <div class="date">
            ${item.from || "Today"} → ${item.to || "Today"}
          </div>
        `;

        container.appendChild(card);
      });
    }

    render();
  </script>

</body>
</html>
